name : Secrets
on : push
jobs : 
  print :
    runs-on : ubuntu-latest
    env : 
      PASSWORD : ${{ secrets.PASSWORD }}  # secrets 참조
    steps :
      # secrets 콘텍스트를 통해 접근할 수 있다. 콘텍스트 참조시 잊지말고 중간 환경변수를 경유하여 접근해야 한다.
      - run : echo "${PASSWORD}" # 로그 출력이 마스킹된다
      - run : echo "${PASSWORD:0:1} ${PASSWORD#?}" # 로그 출력이 마스킹되지 않는다.